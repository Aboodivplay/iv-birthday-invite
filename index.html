<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Invitation 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video autoplay muted loop playsinline preload="auto" id="bg-video">
        <source src="him.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="content">
        <h1>Counting Down to the Big Day!</h1>
        
        <div id="countdown">
            <div class="time-box"><span id="days">00</span><p>Days</p></div>
            <div class="time-box"><span id="hours">00</span><p>Hours</p></div>
            <div class="time-box"><span id="minutes">00</span><p>Mins</p></div>
            <div class="time-box"><span id="seconds">00</span><p>Secs</p></div>
        </div>
        
        <div class="button-group">
            <button id="unmute-btn">🔊 Click for Sound</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
