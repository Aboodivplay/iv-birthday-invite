<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>aboodivplay Birthday</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video" poster="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        <source src="him.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div id="entry-screen">
        <div class="boot-container">
            <button id="start-btn">INITIALIZE SYSTEM</button>
            <p class="blink">MOBILE ENCRYPTION DETECTED</p>
        </div>
    </div>

    <div class="content" id="main-ui" style="display: none;">
        <h1 class="glitch">aboodivplay Birthday</h1>
        
        <div id="countdown">
            <div class="time-box"><span id="days">00</span><p>DAYS</p></div>
            <div class="time-box"><span id="hours">00</span><p>HRS</p></div>
            <div class="time-box"><span id="minutes">00</span><p>MINS</p></div>
            <div class="time-box"><span id="seconds">00</span><p>SECS</p></div>
        </div>
        
        <button id="mute-toggle">🔊 UNMUTE AUDIO</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
