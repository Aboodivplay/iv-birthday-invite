<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aboodivplay Birthday</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="him.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="content">
        <h1>Counting Down to aboodivplay Birthday!</h1>
        
        <div id="countdown">
            <div class="time-box"><span id="days">00</span><p>Days</p></div>
            <div class="time-box"><span id="hours">00</span><p>Hours</p></div>
            <div class="time-box"><span id="minutes">00</span><p>Mins</p></div>
            <div class="time-box"><span id="seconds">00</span><p>Secs</p></div>
        </div>
        
        <button id="mute-toggle">🔊 CLICK TO UNMUTE MUSIC</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
