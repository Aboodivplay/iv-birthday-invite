<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aboodivplay Birthday</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video loop playsinline id="bg-video" style="display: none;">
        <source src="him.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div id="entry-screen">
        <div class="boot-wrapper">
            <button id="start-btn">INITIALIZE SYSTEM</button>
            <p class="blink">CRITICAL: AUDIO BYPASS REQUIRED</p>
        </div>
    </div>

    <div class="content" id="main-ui" style="display: none;">
        <h1 class="glitch" data-text="aboodivplay Birthday">aboodivplay Birthday</h1>
        
        <div id="countdown">
            <div class="time-box"><span id="days">00</span><p>DAYS</p></div>
            <div class="time-box"><span id="hours">00</span><p>HRS</p></div>
            <div class="time-box"><span id="minutes">00</span><p>MIN</p></div>
            <div class="time-box"><span id="seconds">00</span><p>SEC</p></div>
        </div>
        
        <button id="mute-toggle">🔇 MUTE SYSTEM</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
